[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.bcmath", "php82Extensions.fileinfo", "php82Extensions.tokenizer", "php82Extensions.ctype", "php82Extensions.curl", "nginx", "nodejs_20"]

[phases.install]
cmds = [
    "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer && /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci && npm run build"
]

[phases.build]
cmds = [
    "cp .env.railway .env",
    "php artisan key:generate --force"
]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan storage:link && php-fpm82 -D && nginx -g 'daemon off;'"
